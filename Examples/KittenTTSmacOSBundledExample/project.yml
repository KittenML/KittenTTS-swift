name: KittenTTSmacOSBundledExample
options:
  bundleIdPrefix: com.kittenml
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"

packages:
  KittenSDK:
    path: ../..

targets:
  KittenTTSmacOSBundledExample:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - KittenTTSmacOSBundledExample
    resources: []
    dependencies:
      - package: KittenSDK
        product: KittenTTS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kittenml.KittenTTSmacOSBundledExample
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: KittenTTSmacOSBundledExample/Info.plist

  KittenTTSmacOSBundledExampleUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - KittenTTSmacOSBundledExampleUITests
    dependencies:
      - target: KittenTTSmacOSBundledExample
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kittenml.KittenTTSmacOSBundledExampleUITests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
